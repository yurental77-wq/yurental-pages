<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>관리자 - 페이지 자동생성</title>
<meta name="robots" content="noindex, nofollow" />
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body { font-family:'Apple SD Gothic Neo','맑은 고딕',sans-serif; background:#f5f6f8; min-height:100vh; padding:30px 16px; }
  .box { background:#fff; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.1); padding:32px; width:100%; max-width:520px; margin:0 auto; }
  h1 { font-size:1.2rem; color:#1a4fa0; margin-bottom:18px; text-align:center; }
  h2 { font-size:1rem; color:#1a4fa0; margin:22px 0 10px; }
  label { font-size:0.85rem; color:#555; display:block; margin-bottom:6px; }
  input { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:6px; font-size:0.95rem; margin-bottom:16px; }
  button { width:100%; padding:12px; background:#1a4fa0; color:#fff; border:none; border-radius:6px; font-size:1rem; font-weight:700; cursor:pointer; }
  button.refresh { background:#888; margin-top:8px; }
  button:disabled { background:#aaa; cursor:not-allowed; }
  button:hover:not(:disabled) { opacity:0.9; }
  .progress-wrap { margin-top:8px; }
  .bar-bg { background:#eee; border-radius:20px; height:18px; overflow:hidden; }
  .bar-fill { background:#2a9d5c; height:100%; width:0%; transition:width 0.4s; }
  .status { font-size:0.85rem; color:#444; margin-top:10px; text-align:center; white-space:pre-line; }
  .login-wrap, .gen-wrap { display:none; }
  .login-wrap.show, .gen-wrap.show { display:block; }
  .small { font-size:0.78rem; color:#888; margin-top:14px; text-align:center; }
  .summary { display:flex; justify-content:space-between; font-size:0.85rem; color:#333; margin-bottom:6px; }
  table { width:100%; border-collapse:collapse; font-size:0.82rem; margin-top:6px; }
  table th, table td { padding:6px 8px; text-align:left; border-bottom:1px solid #eee; }
  table th { color:#888; font-weight:600; }
  .count-row { display:flex; gap:10px; align-items:flex-end; }
  .count-row > div:first-child { flex:1; }
  .count-row button { width:auto; padding:10px 18px; margin-bottom:16px; }
</style>
</head>
<body>

<div class="box">
  <h1>🔐 관리자 - 페이지 자동생성</h1>

  <div class="login-wrap show" id="loginWrap">
    <label>관리자 비밀번호</label>
    <input type="password" id="pwInput" placeholder="비밀번호 입력" />
    <button onclick="login()">로그인</button>
    <div class="status" id="loginStatus"></div>
  </div>

  <div class="gen-wrap" id="genWrap">

    <h2>📊 전체 진행 현황</h2>
    <div class="summary">
      <span id="summaryText">불러오는 중...</span>
      <span id="summaryPct"></span>
    </div>
    <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
    <button class="refresh" onclick="loadStatus()">🔄 현황 새로고침</button>

    <table id="provinceTable" style="display:none;">
      <thead><tr><th>시/도</th><th>발행</th><th>전체</th></tr></thead>
      <tbody id="provinceTbody"></tbody>
    </table>

    <h2>⚙️ 페이지 생성</h2>
    <div class="count-row">
      <div>
        <label>이번에 생성할 개수</label>
        <input type="number" id="countInput" value="50" min="1" max="300" />
      </div>
      <button onclick="generateBatch()" id="genBtn">생성 &amp; 업로드</button>
    </div>
    <div class="status" id="genStatus"></div>
    <div class="small">※ 입력한 개수만큼 무작위 순서로 생성되어 GitHub에 커밋됩니다 (1회 최대 300개). Netlify가 자동으로 배포합니다.</div>
  </div>
</div>

<script>
  let adminPw = '';

  async function login() {
    adminPw = document.getElementById('pwInput').value;
    if (!adminPw) {
      document.getElementById('loginStatus').textContent = '비밀번호를 입력하세요.';
      return;
    }
    document.getElementById('loginStatus').textContent = '확인 중...';
    try {
      const res = await fetch('/.netlify/functions/status', {
        headers: { 'x-admin-password': adminPw },
      });
      if (res.status === 401) {
        document.getElementById('loginStatus').textContent = '❌ 비밀번호가 올바르지 않습니다.';
        return;
      }
      if (!res.ok) {
        document.getElementById('loginStatus').textContent = '❌ 서버 오류가 발생했습니다.';
        return;
      }
    } catch (e) {
      document.getElementById('loginStatus').textContent = '❌ 네트워크 오류: ' + e.message;
      return;
    }

    // 인증 성공 — 같은 브라우저(같은 도메인)에서 메인 페이지의 편집 모드 버튼이 보이게 표시
    localStorage.setItem('hanarental_admin_session', 'true');

    document.getElementById('loginWrap').classList.remove('show');
    document.getElementById('genWrap').classList.add('show');
    loadStatus();
  }

  function renderStatus(data) {
    document.getElementById('summaryText').textContent =
      `총 ${data.totalPublished} / ${data.totalRows} 페이지 발행됨`;
    document.getElementById('summaryPct').textContent = `${data.percentage}%`;
    document.getElementById('barFill').style.width = data.percentage + '%';

    const tbody = document.getElementById('provinceTbody');
    tbody.innerHTML = '';
    const provinces = Object.keys(data.byProvinceTotal);
    if (provinces.length) {
      document.getElementById('provinceTable').style.display = 'table';
      provinces.forEach(p => {
        const pub = data.byProvincePublished[p] || 0;
        const total = data.byProvinceTotal[p];
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${p}</td><td>${pub}</td><td>${total}</td>`;
        tbody.appendChild(tr);
      });
    }
  }

  async function loadStatus() {
    document.getElementById('summaryText').textContent = '불러오는 중...';
    try {
      const res = await fetch('/.netlify/functions/status', {
        headers: { 'x-admin-password': adminPw },
      });
      const data = await res.json();
      if (res.status === 401) {
        document.getElementById('summaryText').textContent = '❌ 비밀번호 오류';
        return;
      }
      if (data.error) {
        document.getElementById('summaryText').textContent = '❌ ' + data.error;
        return;
      }
      renderStatus(data);
    } catch (e) {
      document.getElementById('summaryText').textContent = '❌ 네트워크 오류: ' + e.message;
    }
  }

  async function generateBatch() {
    const btn = document.getElementById('genBtn');
    const statusEl = document.getElementById('genStatus');
    const count = parseInt(document.getElementById('countInput').value, 10) || 50;
    btn.disabled = true;
    statusEl.textContent = `${count}개 생성 중입니다... (최대 1~2분 정도 걸릴 수 있어요)`;

    try {
      const res = await fetch('/.netlify/functions/generate-batch', {
        method: 'POST',
        headers: { 'x-admin-password': adminPw, 'content-type': 'application/json' },
        body: JSON.stringify({ count }),
      });
      const data = await res.json();

      if (res.status === 401) {
        statusEl.textContent = '❌ 비밀번호가 올바르지 않습니다. 새로고침 후 다시 로그인하세요.';
        btn.disabled = false;
        return;
      }
      if (data.error) {
        statusEl.textContent = '❌ 오류: ' + data.error;
        btn.disabled = false;
        return;
      }
      if (data.done) {
        statusEl.textContent = `✅ 모든 페이지 생성 완료! (총 ${data.published}/${data.total})`;
        await loadStatus();
        btn.disabled = true;
        return;
      }

      statusEl.textContent = `✅ ${data.addedThisBatch}개 추가 완료\n총 ${data.totalPublished} / ${data.totalRows} 페이지\nNetlify 배포까지 1~2분 정도 걸립니다.`;
      await loadStatus();
    } catch (e) {
      statusEl.textContent = '❌ 네트워크 오류: ' + e.message;
    }
    btn.disabled = false;
  }
</script>

</body>
</html>
